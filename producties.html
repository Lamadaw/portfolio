<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BirkBosma — Producties</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="icon" href="images/logo.png">
</head>
<body>

  <header class="site-header">
    <a class="logo" href="index.html"><img src="images/logo.png" alt="BirkBosma logo"></a>
  </header>

  <nav class="nav">
    <a href="index.html">Portfolio</a>
    <a href="fotografie.html">Fotografie</a>
    <a href="about.html">About</a>
    <a href="school.html" class="active">School</a>
  </nav>

  <main class="page prod-page">
    <a class="back" href="school.html">&larr; Terug naar School</a>
    <h1>Producties</h1>
    <p class="prod-intro">Producties waar ik aan heb meegeholpen. Per event een kort stukje over wat het was en wat ik heb gedaan, met foto's van mij op de set.</p>

    <div id="prodList"></div>
  </main>

  <!-- Lightbox -->
  <div id="lightbox" class="prod-lightbox" hidden>
    <button class="lb-close" id="lbClose" aria-label="Sluiten">&times;</button>
    <button class="lb-nav lb-prev" id="lbPrev" aria-label="Vorige">&lsaquo;</button>
    <img id="lbImg" src="" alt="">
    <button class="lb-nav lb-next" id="lbNext" aria-label="Volgende">&rsaquo;</button>
  </div>

  <footer class="site-footer">&copy; BirkBosma</footer>

  <script src="data/producties.js"></script>
  <script>
    (function(){
      var DATA = window.PRODUCTIES_DATA || { producties: [] };

      function esc(s){
        return String(s == null ? '' : s)
          .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
          .replace(/"/g,'&quot;');
      }

      // Flat list of all photos (for lightbox navigation), filled while rendering.
      var gallery = [];

      function renderProducties(){
        var wrap = document.getElementById('prodList');
        var list = DATA.producties || [];
        if (!list.length){
          wrap.innerHTML = '<p class="prod-empty">Nog geen producties toegevoegd. Voeg ze toe in <code>data/producties.js</code>.</p>';
          return;
        }
        wrap.innerHTML = list.map(function(p){
          var fotos = p.fotos || [];
          var media;
          if (fotos.length){
            media = '<div class="prod-gallery">' + fotos.map(function(f){
              var src = f.indexOf('/') > -1 ? f : 'images/producties/' + f;
              var gi = gallery.length;
              gallery.push(src);
              return '<button class="prod-thumb" data-i="' + gi + '" aria-label="Vergroot foto">' +
                       '<img src="' + esc(src) + '" alt="' + esc(p.titel) + '" loading="lazy">' +
                     '</button>';
            }).join('') + '</div>';
          } else {
            media = '<div class="prod-nogallery">Foto\u2019s volgen</div>';
          }
          return '<article class="prod-card">' +
                   '<div class="prod-body">' +
                     '<h2>' + esc(p.titel) + '</h2>' +
                     '<p class="prod-text">' + esc(p.tekst) + '</p>' +
                   '</div>' +
                   media +
                 '</article>';
        }).join('');
      }

      // ---- Lightbox ----
      var lb = document.getElementById('lightbox');
      var lbImg = document.getElementById('lbImg');
      var cur = 0;

      function openLb(i){
        cur = i;
        lbImg.src = gallery[cur];
        lb.hidden = false;
        document.body.style.overflow = 'hidden';
      }
      function closeLb(){
        lb.hidden = true;
        lbImg.src = '';
        document.body.style.overflow = '';
      }
      function step(d){
        if (!gallery.length) return;
        cur = (cur + d + gallery.length) % gallery.length;
        lbImg.src = gallery[cur];
      }

      renderProducties();

      document.getElementById('prodList').addEventListener('click', function(e){
        var btn = e.target.closest('.prod-thumb');
        if (btn) openLb(parseInt(btn.getAttribute('data-i'), 10));
      });
      document.getElementById('lbClose').addEventListener('click', closeLb);
      document.getElementById('lbPrev').addEventListener('click', function(){ step(-1); });
      document.getElementById('lbNext').addEventListener('click', function(){ step(1); });
      lb.addEventListener('click', function(e){ if (e.target === lb) closeLb(); });
      document.addEventListener('keydown', function(e){
        if (lb.hidden) return;
        if (e.key === 'Escape') closeLb();
        else if (e.key === 'ArrowLeft') step(-1);
        else if (e.key === 'ArrowRight') step(1);
      });
    })();
  </script>

</body>
</html>
