<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BirkBosma — BakePerfect</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="icon" href="images/logo.png">
</head>
<body>

  <header class="site-header">
    <a class="logo" href="index.html"><img src="images/logo.png" alt="BirkBosma logo"></a>
  </header>

  <nav class="nav">
    <a href="index.html" class="active">Portfolio</a>
    <a href="fotografie.html">Fotografie</a>
    <a href="about.html">About</a>
    <a href="school.html">School</a>
  </nav>

  <main class="video-wrap" data-video="bakeperfect">
    <a class="back" href="index.html">&larr; Terug naar portfolio</a>
    <div class="video-layout">
      <div class="video-main">
        <div class="player">
      <iframe
        src="https://www.youtube.com/embed/lOTfbvQWaPQ?rel=0&playsinline=1"
        title="BakePerfect"
        loading="lazy"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        referrerpolicy="strict-origin-when-cross-origin"
        allowfullscreen></iframe>
    </div>

    <h1 class="video-title" id="vTitle">BakePerfect</h1>
    <p class="video-meta"><a href="https://youtu.be/lOTfbvQWaPQ" target="_blank" rel="noopener">Bekijk op YouTube &nearr;</a></p>
      </div>
      <aside class="video-side"><div id="vOnderdelen"></div></aside>
    </div>
  </main>

  <footer class="site-footer">&copy; BirkBosma</footer>

  <script src="data/onderdelen.js"></script>
  <script src="js/onderdelen.js"></script>
  <script src="data/videos.js"></script>
  <script>
    // Examenonderdelen-kadertje (rechtsboven): leest data/videos.js voor deze pagina.
    (function(){
      var main = document.querySelector('main.video-wrap');
      var key = main && main.getAttribute('data-video');
      var v = (window.VIDEO_DATA || {})[key];
      if (v && v.onderdelen && window.Onderdelen) {
        document.getElementById('vOnderdelen').innerHTML = window.Onderdelen.renderLeerdoelen(v.onderdelen, { kop: 'Behaalde leerdoelen' });
      }
    })();

    // Try to show the real YouTube title; keep the fallback if it can't be fetched.
    fetch('https://www.youtube.com/oembed?format=json&url=https://youtu.be/lOTfbvQWaPQ')
      .then(function(r){ return r.ok ? r.json() : Promise.reject(); })
      .then(function(d){
        document.getElementById('vTitle').textContent = d.title;
        document.title = 'BirkBosma \u2014 ' + d.title;
      })
      .catch(function(){});
  </script>

</body>
</html>
