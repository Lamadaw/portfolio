<body>

  <header class="site-header">

  <nav class="nav">

  <main class="video-wrap">

    <div class="player">
      <iframe
        src="https://www.youtube.com/embed/IwiSgLlj0bE?rel=0&playsinline=1"
        title="Vega Interview"
        loading="lazy"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        referrerpolicy="strict-origin-when-cross-origin"
        allowfullscreen></iframe>

  <footer class="site-footer">&copy; BirkBosma</footer>

  <script>
    // Try to show the real YouTube title; keep the fallback if it can't be fetched.
    fetch('https://www.youtube.com/oembed?format=json&url=https://youtu.be/IwiSgLlj0bE')
      .then(function(r){ return r.ok ? r.json() : Promise.reject(); })
      .then(function(d){
        document.getElementById('vTitle').textContent = d.title;
        document.title = 'BirkBosma \u2014 ' + d.title;
      })
      .catch(function(){});
  </script>
